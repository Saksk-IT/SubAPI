<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#f6f9ff"/><rect x="50" y="42" width="1180" height="636" rx="28" fill="#fff" stroke="#dce6f5" stroke-width="2"/>
  <g font-family="Arial, PingFang SC, sans-serif"><text x="92" y="108" fill="#17335c" font-size="32" font-weight="700">定位 .codex 配置目录</text><text x="92" y="148" fill="#60728d" font-size="19">确认当前用户目录、隐藏文件和真实扩展名</text>
  <g><rect x="92" y="194" width="340" height="210" rx="20" fill="#eef5ff" stroke="#bed1f2"/><circle cx="132" cy="236" r="22" fill="#235bd6"/><text x="124" y="244" fill="#fff" font-size="18" font-weight="700">1</text><text x="170" y="244" fill="#17335c" font-size="23" font-weight="700">Windows</text><text x="124" y="298" fill="#435873" font-size="18">%USERPROFILE%\.codex</text><rect x="124" y="330" width="274" height="42" rx="10" fill="#fff"/><text x="145" y="357" fill="#60728d" font-size="16">显示隐藏项目 + 扩展名</text></g>
  <g><rect x="470" y="194" width="340" height="210" rx="20" fill="#eef5ff" stroke="#bed1f2"/><circle cx="510" cy="236" r="22" fill="#235bd6"/><text x="502" y="244" fill="#fff" font-size="18" font-weight="700">2</text><text x="548" y="244" fill="#17335c" font-size="23" font-weight="700">macOS</text><text x="502" y="298" fill="#435873" font-size="18">~/.codex</text><rect x="502" y="330" width="274" height="42" rx="10" fill="#fff"/><text x="524" y="357" fill="#60728d" font-size="16">Command + Shift + .</text></g>
  <g><rect x="848" y="194" width="340" height="210" rx="20" fill="#eef5ff" stroke="#bed1f2"/><circle cx="888" cy="236" r="22" fill="#235bd6"/><text x="880" y="244" fill="#fff" font-size="18" font-weight="700">3</text><text x="926" y="244" fill="#17335c" font-size="23" font-weight="700">Linux</text><text x="880" y="298" fill="#435873" font-size="18">~/.codex</text><rect x="880" y="330" width="274" height="42" rx="10" fill="#fff"/><text x="902" y="357" fill="#60728d" font-size="16">确认当前用户和权限</text></g>
  <path d="M260 438V476M640 438V476M1018 438V476M260 476H1018" fill="none" stroke="#8baae0" stroke-width="4" stroke-linecap="round"/>
  <rect x="344" y="496" width="592" height="112" rx="20" fill="#f8fbff" stroke="#235bd6" stroke-width="3"/><path d="M390 532H468L488 554H570V586H390Z" fill="#dce9ff" stroke="#7da2e4"/><text x="604" y="544" fill="#17335c" font-size="21" font-weight="700">config.toml</text><text x="604" y="580" fill="#17335c" font-size="21" font-weight="700">auth.json</text><text x="812" y="563" fill="#235bd6" font-size="18">两个文件在同一目录</text></g>
</svg>

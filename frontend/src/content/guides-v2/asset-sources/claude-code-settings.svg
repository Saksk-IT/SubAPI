<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#f6f9ff"/><rect x="54" y="44" width="1172" height="632" rx="28" fill="#fff" stroke="#dae6f6" stroke-width="2"/>
  <g font-family="Arial, PingFang SC, sans-serif"><text x="96" y="112" fill="#17335c" font-size="32" font-weight="700">Claude Code：配置方式二选一</text><text x="96" y="151" fill="#60728d" font-size="19">不要同时保存两套不同值</text>
  <rect x="96" y="208" width="462" height="350" rx="24" fill="#eef5ff" stroke="#235bd6" stroke-width="3"/><circle cx="142" cy="254" r="23" fill="#235bd6"/><text x="134" y="263" fill="#fff" font-size="20" font-weight="700">A</text><text x="184" y="262" fill="#17335c" font-size="25" font-weight="700">settings.json</text><text x="132" y="316" fill="#435873" font-size="18">只影响 Claude Code</text><rect x="132" y="350" width="388" height="142" rx="15" fill="#fff" stroke="#c8d7ed"/><text x="160" y="388" fill="#235bd6" font-size="17">"env": {</text><text x="184" y="422" fill="#435873" font-size="16">"ANTHROPIC_BASE_URL": "..."</text><text x="184" y="456" fill="#435873" font-size="16">"ANTHROPIC_AUTH_TOKEN": "..."</text><text x="160" y="480" fill="#235bd6" font-size="17">}</text>
  <text x="614" y="389" fill="#8aa0bb" font-size="24" font-weight="700">或</text>
  <rect x="720" y="208" width="462" height="350" rx="24" fill="#eef5ff" stroke="#a8bddc" stroke-width="2"/><circle cx="766" cy="254" r="23" fill="#6f8ebc"/><text x="758" y="263" fill="#fff" font-size="20" font-weight="700">B</text><text x="808" y="262" fill="#17335c" font-size="25" font-weight="700">系统环境变量</text><text x="756" y="316" fill="#435873" font-size="18">在新终端会话中生效</text><rect x="756" y="350" width="388" height="142" rx="15" fill="#fff" stroke="#c8d7ed"/><text x="784" y="395" fill="#435873" font-size="17">ANTHROPIC_BASE_URL</text><text x="784" y="439" fill="#435873" font-size="17">ANTHROPIC_AUTH_TOKEN</text><text x="784" y="475" fill="#60728d" font-size="15">设置后完全重开终端</text>
  <rect x="386" y="592" width="508" height="48" rx="24" fill="#dfeaff"/><text x="480" y="623" fill="#235bd6" font-size="18" font-weight="700">选择一种 · 保存 · 重开终端 · 运行 claude</text></g>
</svg>
